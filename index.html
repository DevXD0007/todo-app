<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>To Do Pro+</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
padding:15px;
}

/* GLASS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* INPUT */
input,button{
border:none;
border-radius:12px;
padding:12px;
margin:5px;
font-size:14px;
}

button{
background:#4facfe;
color:white;
cursor:pointer;
}

/* TASK */
.task{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
margin:8px 0;
border-radius:14px;
background:rgba(255,255,255,0.1);
cursor:grab;
}

.task.completed{
text-decoration:line-through;
opacity:0.6;
}

.stats{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:10px;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h2>📋 My Tasks</h2>

<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>

<div class="stats">
<div id="total"></div>
<div id="completed"></div>
<div id="streak"></div>
</div>
</div>

<div class="card">
<canvas id="chart" height="100"></canvas>
</div>

<div id="tasks"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let currentTasks=[];

const tasksDiv=document.getElementById("tasks");

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;
auth.style.display="none";
app.style.display="block";
loadTasks();
}
});

/* AUTH */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* LOAD */
async function loadTasks(){
let ref=doc(db,"tasks",userId);
let snap=await getDoc(ref);

let list=snap.data()?.list||[];

/* FIX OLD DATA */
currentTasks=list.map(t=>{
if(typeof t==="string") return {text:t,done:false};
return t;
});

await setDoc(ref,{list:currentTasks});

render();
updateStats();
updateChart();
}

/* RENDER */
function render(){
tasksDiv.innerHTML="";

currentTasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" completed":"");
div.draggable=true;

div.innerHTML=`
<div>
<input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
${t.text}
</div>
<button onclick="deleteTask(${i})">❌</button>
`;

tasksDiv.appendChild(div);

/* DRAG */
div.addEventListener("dragstart",()=>div.classList.add("dragging"));
div.addEventListener("dragend",()=>{
div.classList.remove("dragging");
saveOrder();
});
});

tasksDiv.addEventListener("dragover",e=>{
e.preventDefault();
const dragging=document.querySelector(".dragging");
const after=getAfter(e.clientY);
if(after==null) tasksDiv.appendChild(dragging);
else tasksDiv.insertBefore(dragging,after);
});
}

/* DRAG HELPER */
function getAfter(y){
const els=[...tasksDiv.querySelectorAll(".task:not(.dragging)")];
return els.reduce((closest,child)=>{
const box=child.getBoundingClientRect();
const offset=y-box.top-box.height/2;
if(offset<0 && offset>closest.offset){
return{offset,element:child};
}else return closest;
},{offset:-999}).element;
}

/* SAVE ORDER */
async function saveOrder(){
currentTasks=[...tasksDiv.children].map(el=>{
return{
text:el.innerText,
done:el.querySelector("input").checked
};
});
await setDoc(doc(db,"tasks",userId),{list:currentTasks});
}

/* ADD */
window.addTask=async()=>{
let text=taskInput.value.trim();
if(!text)return;

currentTasks.push({text,done:false});
await setDoc(doc(db,"tasks",userId),{list:currentTasks});

taskInput.value="";
loadTasks();
};

/* TOGGLE */
window.toggleTask=async(i)=>{
currentTasks[i].done=!currentTasks[i].done;
await setDoc(doc(db,"tasks",userId),{list:currentTasks});
loadTasks();
};

/* DELETE */
window.deleteTask=async(i)=>{
currentTasks.splice(i,1);
await setDoc(doc(db,"tasks",userId),{list:currentTasks});
loadTasks();
};

/* STATS + STREAK */
function updateStats(){
let total=currentTasks.length;
let done=currentTasks.filter(t=>t.done).length;

document.getElementById("total").innerText="Total: "+total;
document.getElementById("completed").innerText="Done: "+done;

/* SIMPLE STREAK */
let streak=localStorage.getItem("streak")||0;
if(total>0) streak++;
else streak=0;

localStorage.setItem("streak",streak);
document.getElementById("streak").innerText="🔥 "+streak;
}

/* CHART */
function updateChart(){
let done=currentTasks.filter(t=>t.done).length;
new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Done","Pending"],
datasets:[{
data:[done,currentTasks.length-done]
}]
}
});
}
</script>

</body>
</html>

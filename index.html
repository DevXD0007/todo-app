<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>

<style>
:root{
--bg1:#0f2027;
--bg2:#2c5364;
--glass:rgba(255,255,255,0.08);
--text:white;
}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
padding:20px;
}

/* GLASS CARD */
.card{
background:var(--glass);
backdrop-filter:blur(18px);
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
input,button{
padding:12px;
border:none;
border-radius:12px;
margin:5px;
}

button{
background:#4facfe;
color:white;
cursor:pointer;
}

/* TASK */
.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:8px 0;
border-radius:14px;
background:rgba(255,255,255,0.1);
}

.task.completed{
text-decoration:line-through;
opacity:0.6;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.date-box{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">

<div class="header">
<h2>📋 To Do List</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="date-box">
<input type="date" id="date">
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
</div>

</div>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let tasksData={};

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;
authDiv.style.display="none";
appDiv.style.display="block";

date.value=new Date().toISOString().split("T")[0];

load();
}
});

window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* LOAD */
async function load(){
let snap=await getDoc(doc(db,"tasks",userId));
tasksData=snap.data()?.dates||{};
render();
}

/* RENDER */
function render(){
let d=date.value;
let list=tasksData[d]||[];

tasksDiv.innerHTML="";

list.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" completed":"");

div.innerHTML=`
<div>
<input type="checkbox" ${t.done?"checked":""} onchange="toggleTask('${d}',${i})">
${t.text}
</div>
<button onclick="deleteTask('${d}',${i})">❌</button>
`;

tasksDiv.appendChild(div);
});

if(list.length===0){
tasksDiv.innerHTML="<div class='card'>No tasks for this date ✨</div>";
}
}

/* ADD */
window.addTask=async()=>{
let d=date.value;
let text=taskInput.value.trim();
if(!text)return;

if(!tasksData[d]) tasksData[d]=[];

tasksData[d].push({text,done:false});

await setDoc(doc(db,"tasks",userId),{dates:tasksData});

taskInput.value="";
render();
};

/* TOGGLE */
window.toggleTask=async(d,i)=>{
tasksData[d][i].done=!tasksData[d][i].done;

await setDoc(doc(db,"tasks",userId),{dates:tasksData});
render();
};

/* DELETE */
window.deleteTask=async(d,i)=>{
tasksData[d].splice(i,1);

await setDoc(doc(db,"tasks",userId),{dates:tasksData});
render();
};

/* DATE CHANGE */
date.onchange=render;

/* DOM */
const authDiv=document.getElementById("auth");
const appDiv=document.getElementById("app");
const tasksDiv=document.getElementById("tasks");
</script>

</body>
</html>

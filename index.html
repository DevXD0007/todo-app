<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>

<style>
body{
font-family:sans-serif;
background:#0f2027;
color:white;
padding:20px;
}
.box{
background:#1e2a38;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}
input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}
button{cursor:pointer;}
.task{margin:5px 0;}
</style>
</head>

<body>

<div id="auth" class="box">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="box">
<h2>📋 To Do List</h2>
<input type="date" id="date">
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>
</div>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0",
  storageBucket: "todo-app-b2da0.firebasestorage.app",
  messagingSenderId: "152976873140",
  appId: "1:152976873140:web:7ae0c71cafc1fc67f469e1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

onAuthStateChanged(auth, user => {
  if(user){
    userId = user.uid;

    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

    loadTasks();
  }
});

window.signup = function(){
  createUserWithEmailAndPassword(auth, email.value, password.value)
  .then(()=>alert("Account created"))
  .catch(e=>alert(e.message));
}

window.login = function(){
  signInWithEmailAndPassword(auth, email.value, password.value)
  .catch(e=>alert(e.message));
}

window.logout = function(){
  signOut(auth);
  location.reload();
}

async function loadTasks(){
  let d = date.value;

  let ref = doc(db,"tasks",userId,"dates",d);
  let snap = await getDoc(ref);

  let list = snap.data()?.list || [];

  let html="";
  list.forEach(t=>{
    html += `<div class="box task">${t}</div>`;
  });

  if(list.length===0){
    html = "<div>No tasks yet ✨</div>";
  }

  document.getElementById("tasks").innerHTML = html;
}

window.addTask = async function(){
  let d = date.value;
  let text = taskInput.value.trim();
  if(!text) return;

  let ref = doc(db,"tasks",userId,"dates",d);
  let snap = await getDoc(ref);

  let list = snap.data()?.list || [];

  list.push(text);

  await setDoc(ref,{list});

  taskInput.value="";
  loadTasks();
}

document.getElementById("date").addEventListener("change", loadTasks);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do Pro+</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
padding:20px;
}

/* GLASS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

button{
cursor:pointer;
background:#4facfe;
color:white;
}

/* TASK */
.task{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
margin:6px 0;
border-radius:10px;
background:rgba(255,255,255,0.1);
}

.task.completed{
text-decoration:line-through;
opacity:0.6;
}

.stats{
display:flex;
gap:20px;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h2>📋 My Tasks</h2>

<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>

<div class="stats">
<div id="total">Total: 0</div>
<div id="completed">Done: 0</div>
</div>
</div>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let currentTasks=[];

const authDiv=document.getElementById("auth");
const appDiv=document.getElementById("app");
const tasksDiv=document.getElementById("tasks");

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;
authDiv.style.display="none";
appDiv.style.display="block";
loadTasks();
}else{
authDiv.style.display="block";
appDiv.style.display="none";
}
});

/* AUTH FUNCTIONS */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* LOAD */
async function loadTasks(){
let ref=doc(db,"tasks",userId);
let snap=await getDoc(ref);

currentTasks=snap.data()?.list||[];

render();
updateStats();
}

/* RENDER */
function render(){
tasksDiv.innerHTML="";

currentTasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" completed":"");

div.innerHTML=`
<div>
<input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
${t.text}
</div>
<button onclick="deleteTask(${i})">❌</button>
`;

tasksDiv.appendChild(div);
});

if(currentTasks.length===0){
tasksDiv.innerHTML="<div>No tasks yet ✨</div>";
}
}

/* ADD */
window.addTask=async()=>{
let text=taskInput.value.trim();
if(!text)return;

currentTasks.push({text,done:false});

await setDoc(doc(db,"tasks",userId),{list:currentTasks});

taskInput.value="";
loadTasks();
};

/* TOGGLE */
window.toggleTask=async(i)=>{
currentTasks[i].done=!currentTasks[i].done;

await setDoc(doc(db,"tasks",userId),{list:currentTasks});

loadTasks();
};

/* DELETE */
window.deleteTask=async(i)=>{
currentTasks.splice(i,1);

await setDoc(doc(db,"tasks",userId),{list:currentTasks});

loadTasks();
};

/* STATS */
function updateStats(){
let total=currentTasks.length;
let done=currentTasks.filter(t=>t.done).length;

document.getElementById("total").innerText="Total: "+total;
document.getElementById("completed").innerText="Done: "+done;
}
</script>

</body>
</html>

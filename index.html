<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>

<style>
:root{
--bg:#0f2027;
--bg2:#2c5364;
--glass:rgba(255,255,255,0.08);
--accent:#4facfe;
--text:white;
}

.light{
--bg:#f5f7fa;
--bg2:#ffffff;
--glass:rgba(255,255,255,0.6);
--text:#222;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,var(--bg),var(--bg2));
color:var(--text);
padding:15px;
transition:0.3s;
}

/* CARD */
.card{
background:var(--glass);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin-bottom:15px;
}

/* TASK */
.task{
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
cursor:grab;
transition:transform 0.2s ease;
}

.task:active{
transform:scale(0.97);
}

/* GHOST */
.ghost{
position:fixed;
pointer-events:none;
padding:12px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
transform:translate(-50%,-50%);
z-index:999;
}

/* CALENDAR */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
padding:12px;
border-radius:12px;
text-align:center;
background:rgba(255,255,255,0.05);
transition:0.2s;
}

.day.active{background:var(--accent);}
.day.done{border:2px solid #4caf50;}
.day.drop{outline:2px solid white;}

/* WEEK */
.week{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.wday{
background:rgba(255,255,255,0.05);
padding:6px;
border-radius:8px;
font-size:12px;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h2>📋 To Do List</h2>
<button onclick="toggleTheme()">🌓</button>
<button onclick="logout()">Logout</button>

<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
<div id="stats"></div>
</div>

<div class="card">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthTitle"></span>
<button onclick="changeMonth(1)">▶</button>

<div id="calendar" class="calendar"></div>
</div>

<div id="tasks"></div>

<div class="card">
<h3>This Week</h3>
<div id="week" class="week"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
authDomain:"todo-app-b2da0.firebaseapp.com",
projectId:"todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* DOM FIRST (FIXED ERROR) */
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const tasksDiv = document.getElementById("tasks");
const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const week = document.getElementById("week");
const stats = document.getElementById("stats");

/* STATE */
let userId=null;
let data={};
let current=new Date();
let selected=new Date().toISOString().slice(0,10);
let dragIndex=null;
let ghost=null;

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;
authDiv.style.display="none";
appDiv.style.display="block";
load();
}
});

window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* LOAD */
async function load(){
let snap=await getDoc(doc(db,"tasks",userId));
data=snap.data()?.dates||{};
renderAll();
}

async function save(){
await setDoc(doc(db,"tasks",userId),{dates:data});
}

/* CALENDAR */
function renderCalendar(){
calendar.innerHTML="";
let y=current.getFullYear();
let m=current.getMonth();

monthTitle.innerText=current.toLocaleString("default",{month:"long",year:"numeric"});

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++) calendar.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){
let date=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
let div=document.createElement("div");
div.className="day";
div.innerText=d;

if(date===selected) div.classList.add("active");

div.onclick=()=>{selected=date;renderAll();};

/* DROP */
div.ontouchend=()=>{if(dragIndex!==null) moveTask(date)};
div.ondragover=e=>e.preventDefault();
div.ondrop=()=>moveTask(date);

calendar.appendChild(div);
}
}

/* TASKS */
function renderTasks(){
tasksDiv.innerHTML="";
let list=data[selected]||[];

list.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task";
div.draggable=true;

/* DRAG START */
div.ondragstart=(e)=>{
dragIndex=i;
createGhost(t.text,e);
};

/* DRAG END */
div.ondragend=removeGhost;

/* MOBILE */
div.ontouchstart=(e)=>{
dragIndex=i;
createGhost(t.text,e.touches[0]);
};

div.innerHTML=`
<div>
<input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
${t.text}
</div>
<button onclick="deleteTask(${i})">❌</button>
`;

tasksDiv.appendChild(div);
});
}

/* GHOST */
function createGhost(text,e){
ghost=document.createElement("div");
ghost.className="ghost";
ghost.innerText=text;
document.body.appendChild(ghost);

moveGhost(e);

document.onmousemove=moveGhost;
document.ontouchmove=(ev)=>moveGhost(ev.touches[0]);
}

function moveGhost(e){
if(ghost){
ghost.style.left=e.clientX+"px";
ghost.style.top=e.clientY+"px";
}
}

function removeGhost(){
if(ghost){
ghost.remove();
ghost=null;
}
document.onmousemove=null;
document.ontouchmove=null;
}

/* MOVE */
async function moveTask(newDate){
let task=data[selected][dragIndex];
data[selected].splice(dragIndex,1);

if(!data[newDate]) data[newDate]=[];
data[newDate].push(task);

selected=newDate;
removeGhost();

/* SPRING ANIMATION */
tasksDiv.style.transform="scale(0.95)";
setTimeout(()=>tasksDiv.style.transform="scale(1)",150);

await save();
renderAll();
}

/* ACTIONS */
window.addTask=async()=>{
let text=taskInput.value.trim();
if(!text)return;

if(!data[selected]) data[selected]=[];
data[selected].push({text,done:false});

taskInput.value="";
await save();
renderAll();
};

window.toggleTask=async(i)=>{
data[selected][i].done=!data[selected][i].done;
await save();
renderAll();
};

window.deleteTask=async(i)=>{
data[selected].splice(i,1);
await save();
renderAll();
};

/* WEEK */
function renderWeek(){
week.innerHTML="";
for(let i=0;i<7;i++){
let d=new Date();
d.setDate(d.getDate()-i);
let key=d.toISOString().slice(0,10);

week.innerHTML+=`<div class="wday">${key.slice(5)}<br>${(data[key]||[]).length}</div>`;
}
}

/* STATS */
function renderStats(){
let streak=0;
let d=new Date();

for(let i=0;i<365;i++){
let key=new Date(d.setDate(d.getDate()-1)).toISOString().slice(0,10);
if(data[key]?.some(t=>t.done)) streak++;
else break;
}

stats.innerText="🔥 Streak: "+streak;
}

/* SWIPE */
let startX=0;
calendar.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
calendar.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(diff>50) changeMonth(-1);
if(diff<-50) changeMonth(1);
});

/* THEME */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
localStorage.setItem("theme",document.body.classList.contains("light"));
};

if(localStorage.getItem("theme")==="true"){
document.body.classList.add("light");
}

/* MAIN */
function renderAll(){
renderCalendar();
renderTasks();
renderWeek();
renderStats();
}

window.changeMonth=(x)=>{
current.setMonth(current.getMonth()+x);
renderCalendar();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do Pro</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
cursor:pointer;
background:#4facfe;
color:white;
}

.task{
padding:10px;
margin:5px 0;
background:rgba(255,255,255,0.1);
border-radius:8px;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="card" style="display:none">
<h2>📋 My Tasks</h2>

<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>

<div id="tasks"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const tasksDiv = document.getElementById("tasks");

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  if(user){
    userId = user.uid;

    authDiv.style.display = "none";
    appDiv.style.display = "block";

    loadTasks();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

/* SIGNUP */
window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Signup success"))
    .catch(e => alert(e.message));
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Login success"))
    .catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = () => {
  signOut(auth);
};

/* LOAD TASKS */
async function loadTasks(){
  let ref = doc(db,"tasks",userId);
  let snap = await getDoc(ref);

  let list = snap.data()?.list || [];

  tasksDiv.innerHTML = "";

  list.forEach(t=>{
    tasksDiv.innerHTML += `<div class="task">${t}</div>`;
  });
}

/* ADD TASK */
window.addTask = async () => {
  let text = taskInput.value.trim();
  if(!text) return;

  let ref = doc(db,"tasks",userId);
  let snap = await getDoc(ref);

  let list = snap.data()?.list || [];
  list.push(text);

  await setDoc(ref,{list});

  taskInput.value = "";
  loadTasks();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do Pro</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
padding:20px;
}

.card{
background:#1e2a38;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
cursor:pointer;
background:#4facfe;
color:white;
}

.task{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:#243447;
border-radius:8px;
cursor:grab;
}

.task.dragging{
opacity:0.5;
}

.streak{
font-size:14px;
color:#00e676;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h2>📋 To Do Pro</h2>

<div class="streak" id="streak">🔥 Streak: 0 days</div>

<input type="date" id="date">
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>
</div>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let currentTasks=[];

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;

authDiv.style.display="none";
app.style.display="block";

date.value=new Date().toISOString().split("T")[0];

loadTasks();
updateStreak();
}
});

/* AUTH FUNCTIONS */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>{signOut(auth);location.reload();};

/* LOAD TASKS */
async function loadTasks(){
let d=date.value;
let ref=doc(db,"tasks",userId,"dates",d);
let snap=await getDoc(ref);

currentTasks=snap.data()?.list||[];

render();
}

/* RENDER */
function render(){
tasks.innerHTML="";

currentTasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task";
div.draggable=true;
div.innerText=t;

div.addEventListener("dragstart",()=>div.classList.add("dragging"));
div.addEventListener("dragend",()=>{
div.classList.remove("dragging");
saveOrder();
});

tasks.appendChild(div);
});

tasks.addEventListener("dragover",e=>{
e.preventDefault();
const dragging=document.querySelector(".dragging");
const after=getAfter(tasks,e.clientY);
if(after==null) tasks.appendChild(dragging);
else tasks.insertBefore(dragging,after);
});
}

/* DRAG LOGIC */
function getAfter(container,y){
const els=[...container.querySelectorAll(".task:not(.dragging)")];
return els.reduce((closest,child)=>{
const box=child.getBoundingClientRect();
const offset=y-box.top-box.height/2;
if(offset<0 && offset>closest.offset){
return{offset,element:child};
}else return closest;
},{offset:-999}).element;
}

/* SAVE ORDER */
async function saveOrder(){
let newList=[...tasks.children].map(el=>el.innerText);
currentTasks=newList;

await setDoc(doc(db,"tasks",userId,"dates",date.value),{list:newList});
}

/* ADD TASK */
window.addTask=async()=>{
let text=taskInput.value.trim();
if(!text)return;

currentTasks.push(text);

await setDoc(doc(db,"tasks",userId,"dates",date.value),{list:currentTasks});

taskInput.value="";
loadTasks();
updateStreak();
};

/* STREAK */
async function updateStreak(){
let streakCount=0;
let today=new Date();

for(let i=0;i<30;i++){
let d=new Date();
d.setDate(today.getDate()-i);
let key=d.toISOString().split("T")[0];

let snap=await getDoc(doc(db,"tasks",userId,"dates",key));

if(snap.exists() && snap.data().list.length>0){
streakCount++;
}else break;
}

streak.innerText=`🔥 Streak: ${streakCount} days`;
}

/* EVENTS */
date.onchange=loadTasks;

</script>

</body>
</html>

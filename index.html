<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do Pro</title>

<style>
:root{
--bg1:#0f2027;
--bg2:#2c5364;
--glass:rgba(255,255,255,0.08);
--text:white;
}

.light{
--bg1:#e3f2fd;
--bg2:#ffffff;
--glass:rgba(255,255,255,0.6);
--text:#222;
}

body{
font-family:sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
padding:20px;
transition:0.3s;
}

.card{
background:var(--glass);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

button{
cursor:pointer;
background:#4facfe;
color:white;
}

.task{
display:flex;
align-items:center;
gap:10px;
padding:10px;
margin:6px 0;
border-radius:10px;
background:rgba(255,255,255,0.1);
}

.task.completed{
text-decoration:line-through;
opacity:0.6;
}

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-top:10px;
}

.toggle{
float:right;
cursor:pointer;
}
</style>
</head>

<body>

<div id="auth" class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<div id="error" style="color:red;"></div>
</div>

<div id="app" style="display:none">

<div class="card">
<h2>📋 To Do Pro
<span class="toggle" onclick="toggleTheme()">🌙</span>
</h2>

<input type="date" id="date">
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>

<div class="stats">
<div id="total">Total: 0</div>
<div id="completed">Done: 0</div>
</div>
</div>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYBA-2Q4MroEkgSf2ezz7arLKdQpc8s4s",
  authDomain: "todo-app-b2da0.firebaseapp.com",
  projectId: "todo-app-b2da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId=null;
let currentTasks=[];

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
userId=user.uid;

authDiv.style.display="none";
app.style.display="block";

date.value=new Date().toISOString().split("T")[0];

loadTasks();
}
});

/* SIGNUP */
window.signup=()=>{
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(()=>error.innerText="Account created. Now login.")
.catch(e=>error.innerText=e.message);
};

/* LOGIN */
window.login=()=>{
signInWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>error.innerText=e.message);
};

/* LOGOUT */
window.logout=()=>{signOut(auth);location.reload();};

/* LOAD */
async function loadTasks(){
let d=date.value;
let ref=doc(db,"tasks",userId,"dates",d);
let snap=await getDoc(ref);

currentTasks=snap.data()?.list||[];

render();
updateStats();
}

/* RENDER */
function render(){
tasks.innerHTML="";

currentTasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" completed":"");

div.innerHTML=`
<input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
<span>${t.text}</span>
`;

tasks.appendChild(div);
});

if(currentTasks.length===0){
tasks.innerHTML="<div>No tasks yet ✨</div>";
}
}

/* ADD */
window.addTask=async()=>{
let text=taskInput.value.trim();
if(!text)return;

currentTasks.push({text,done:false});

await setDoc(doc(db,"tasks",userId,"dates",date.value),{list:currentTasks});

taskInput.value="";
loadTasks();
};

/* TOGGLE */
window.toggleTask=async(i)=>{
currentTasks[i].done=!currentTasks[i].done;

await setDoc(doc(db,"tasks",userId,"dates",date.value),{list:currentTasks});

loadTasks();
};

/* STATS */
function updateStats(){
let total=currentTasks.length;
let done=currentTasks.filter(t=>t.done).length;

totalEl.innerText="Total: "+total;
completedEl.innerText="Done: "+done;
}

/* THEME */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
};

/* EVENTS */
date.onchange=loadTasks;

/* FIX DOM refs */
const authDiv=document.getElementById("auth");
const app=document.getElementById("app");
const tasks=document.getElementById("tasks");
const error=document.getElementById("error");
const totalEl=document.getElementById("total");
const completedEl=document.getElementById("completed");
</script>

</body>
</html>

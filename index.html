<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#2c5364,#4facfe);
color:white;
padding:20px;
}
.box{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}
input,button{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}
button{
background:rgba(255,255,255,0.2);
color:white;
cursor:pointer;
}
.task{
display:flex;
justify-content:space-between;
margin:5px 0;
}
.completed{
text-decoration:line-through;
opacity:0.6;
}
</style>
</head>

<body>

<div class="box">
<h2>📋 To Do List</h2>

<input type="date" id="date">
<input type="text" id="taskInput" placeholder="Task...">
<button onclick="addTask()">Add</button>
<button onclick="exportCSV()">⬇ Excel</button>
</div>

<div id="tasks"></div>

<script>
let tasksData = JSON.parse(localStorage.getItem("tasks")) || {};

// INIT
document.addEventListener("DOMContentLoaded", () => {
    let today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;
    loadTasks();
});

// SAVE
function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasksData));
}

// LOAD
function loadTasks(){
    let d = document.getElementById("date").value;

    if(!tasksData[d]) tasksData[d] = [];

    let html = "";

    tasksData[d].forEach((t,i)=>{
        html += `
        <div class="box task ${t.done ? 'completed' : ''}">
            <span onclick="toggleTask(${i})">${t.text}</span>
            <button onclick="deleteTask(${i})">X</button>
        </div>
        `;
    });

    document.getElementById("tasks").innerHTML = html;

    if(tasksData[d].length === 0){
        document.getElementById("tasks").innerHTML = "<div>No tasks ✨</div>";
    }
}

// ADD
function addTask(){
    let d = document.getElementById("date").value;
    let text = document.getElementById("taskInput").value.trim();

    if(!text) return;

    if(!tasksData[d]) tasksData[d] = [];

    tasksData[d].push({text, done:false});

    document.getElementById("taskInput").value = "";

    saveTasks();
    loadTasks();
}

// TOGGLE
function toggleTask(i){
    let d = document.getElementById("date").value;

    tasksData[d][i].done = !tasksData[d][i].done;

    saveTasks();
    loadTasks();
}

// DELETE
function deleteTask(i){
    let d = document.getElementById("date").value;

    tasksData[d].splice(i,1);

    saveTasks();
    loadTasks();
}

// EXPORT
function exportCSV(){
    let rows = [["Date","Task","Done"]];

    Object.keys(tasksData).forEach(d=>{
        tasksData[d].forEach(t=>{
            rows.push([d, t.text, t.done ? "Yes":"No"]);
        });
    });

    let csv = rows.map(r=>r.join(",")).join("\n");

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tasks.csv";
    a.click();
}

// CHANGE DATE
document.getElementById("date").addEventListener("change", loadTasks);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>

<style>
body{
font-family:sans-serif;
background:#0f2027;
color:white;
padding:20px;
}
.box{
background:#1e2a38;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}
input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}
button{cursor:pointer;}
.task{display:flex;justify-content:space-between;margin:5px 0;}
</style>
</head>

<body>

<div id="auth" class="box">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="box">
<h2>📋 To Do List</h2>
<input type="date" id="date">
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<button onclick="logout()">Logout</button>
</div>

<div id="tasks"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;

// AUTH STATE
auth.onAuthStateChanged(user=>{
if(user){
userId = user.uid;
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("date").value =
new Date().toISOString().split("T")[0];

loadTasks();
}
});

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// LOAD
async function loadTasks(){
let d=date.value;

let snap=await db.collection("tasks")
.doc(userId)
.collection("dates")
.doc(d)
.get();

let data=snap.data()?.list || [];

render(data);
}

// RENDER
function render(list){
let html="";
list.forEach((t,i)=>{
html+=`
<div class="box task">
<span>${t}</span>
</div>`;
});
tasks.innerHTML=html;
}

// ADD
async function addTask(){
let d=date.value;
let text=taskInput.value.trim();
if(!text)return;

let ref=db.collection("tasks")
.doc(userId)
.collection("dates")
.doc(d);

let snap=await ref.get();
let list=snap.data()?.list || [];

list.push(text);

await ref.set({list});

taskInput.value="";
loadTasks();
}

// DATE CHANGE
date.onchange=loadTasks;
</script>

</body>
</html>
